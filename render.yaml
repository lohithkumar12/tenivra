databases:
  - name: tenivra-db
    plan: free
    databaseName: tenivra
    user: tenivra

services:
  - type: web
    name: tenivra-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tenivra-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 480
      - key: CORS_ORIGINS
        value: https://tenivra.vercel.app
      - key: PYTHON_VERSION
        value: 3.12.8
